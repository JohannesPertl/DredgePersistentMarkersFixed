name: Release mod

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Clean
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force bin,obj,package -ErrorAction SilentlyContinue

      - name: Restore and build
        shell: pwsh
        run: |
          msbuild PersistentMarkers.sln /restore /p:Configuration=Release

      - name: Package mod
        shell: pwsh
        run: |
          $modGuid = "johannespertl.dredgepersistentmarkersfixed"
          $packageDir = "package/$modGuid"
          New-Item -ItemType Directory -Force $packageDir | Out-Null
          Copy-Item bin/PersistentMarkers.dll $packageDir/
          Copy-Item bin/PersistentMarkers.pdb $packageDir/
          Copy-Item bin/mod_meta.json $packageDir/
          Compress-Archive -Path "$packageDir/*" -DestinationPath "package/$modGuid.zip" -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: package/johannespertl.dredgepersistentmarkersfixed.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
